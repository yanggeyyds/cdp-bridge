name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # 安装 Android cmdline-tools 并把 sdkmanager 加入 PATH
      # 来源: https://github.com/android-actions/setup-android
      - name: Set up Android SDK (cmdline-tools)
        uses: android-actions/setup-android@v3
        with:
          # packages 用空格分隔（v3 不接受多行 YAML 折叠成含换行的字符串）
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653 cmake;3.22.1'

      - name: Expose NDK env vars to AGP
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          NDK_DIR="$ANDROID_HOME/ndk/25.2.9519653"
          if [ -d "$NDK_DIR" ]; then
            echo "ANDROID_NDK_HOME=$NDK_DIR" >> "$GITHUB_ENV"
            echo "ANDROID_NDK_ROOT=$NDK_DIR" >> "$GITHUB_ENV"
          else
            echo "::warning::NDK 25.2.9519653 not found at $NDK_DIR; AGP will auto-download"
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 编译 release 版本（用 debug keystore 签名，产出可直接安装的 APK）
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cdp-bridge-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload build reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            build/reports/
          if-no-files-found: warn
